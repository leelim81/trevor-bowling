<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Trevor's Bowling 🎳👑</title>
<style>
  :root{
    --gold:#ffd24a; --bronze:#cd7f32; --silver:#d6d9de; --diamond:#7fe3ff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:#0b0f17; }
  body{
    font-family:"Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color:#fff; touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #game{ display:block; position:fixed; inset:0; width:100vw; height:100vh; }

  /* ---------- HUD ---------- */
  #hud{ position:fixed; inset:0; pointer-events:none; }
  .hudTop{
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:max(10px, env(safe-area-inset-top)) 14px 0;
  }
  .panel{
    background:rgba(10,16,26,.55); border:1px solid rgba(255,255,255,.12);
    border-radius:14px; padding:8px 12px; backdrop-filter:blur(6px);
    box-shadow:0 6px 18px rgba(0,0,0,.35);
  }
  .label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.7; }
  .score{ font-size:clamp(22px,6vw,34px); font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .leader{ text-align:center; }
  .crown{ font-size:clamp(20px,6vw,30px); filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
  .leaderName{ font-weight:800; color:var(--gold); font-size:clamp(14px,4vw,18px); letter-spacing:.04em; }
  .rankRow{ display:flex; align-items:center; gap:8px; }
  .gem{ font-size:18px; }
  .rankName{ font-weight:800; font-size:clamp(13px,3.6vw,17px); }
  .frameInfo{ text-align:right; }
  .frameNum{ font-size:clamp(16px,4.5vw,22px); font-weight:800; }

  /* mute */
  #mute{
    position:fixed; right:14px; bottom:max(14px, env(safe-area-inset-bottom));
    pointer-events:auto; cursor:pointer; font-size:22px; opacity:.8;
    background:rgba(10,16,26,.55); border:1px solid rgba(255,255,255,.12);
    border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  }

  /* ---------- Overlays ---------- */
  .overlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:10; background:radial-gradient(120% 120% at 50% 0%, rgba(13,20,33,.55), rgba(6,9,15,.92));
  }
  .hidden{ display:none !important; }
  .card{
    width:min(440px,92vw); background:linear-gradient(180deg,#141d2e,#0d1320);
    border:1px solid rgba(255,255,255,.14); border-radius:22px; padding:26px 22px;
    text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.55);
  }
  .title{ font-size:clamp(30px,9vw,46px); font-weight:900; margin:2px 0 2px;
    background:linear-gradient(180deg,#fff,#ffd24a); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 0 rgba(0,0,0,.15); letter-spacing:.02em; }
  .subtitle{ opacity:.85; margin:0 0 18px; font-size:15px; }
  .bigbtn{
    pointer-events:auto; cursor:pointer; border:none; border-radius:16px;
    padding:16px 26px; font-size:20px; font-weight:900; color:#1a1205;
    background:linear-gradient(180deg,#ffe07a,#ffc02e);
    box-shadow:0 8px 0 #b9821a, 0 14px 24px rgba(0,0,0,.4); transition:transform .06s, box-shadow .06s;
    letter-spacing:.02em;
  }
  .bigbtn:active{ transform:translateY(5px); box-shadow:0 3px 0 #b9821a, 0 8px 14px rgba(0,0,0,.4); }
  .howto{ margin-top:18px; font-size:13px; opacity:.7; line-height:1.5; }
  #nameInput{
    display:block; width:100%; max-width:300px; margin:0 auto 16px; text-align:center;
    font-family:inherit; font-size:20px; font-weight:800; color:#fff;
    padding:13px 16px; border-radius:14px; outline:none;
    background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.18);
    transition:border-color .15s, background .15s;
  }
  #nameInput::placeholder{ color:rgba(255,255,255,.4); font-weight:600; }
  #nameInput:focus{ border-color:var(--gold); background:rgba(255,210,74,.10); }
  .lbTitle{ font-size:14px; font-weight:800; letter-spacing:.04em; opacity:.85; margin-top:14px; margin-bottom:-4px; }
  .finalScore{ font-size:clamp(40px,12vw,64px); font-weight:900; color:var(--gold); line-height:1; margin:6px 0 2px;
    font-variant-numeric:tabular-nums; text-shadow:0 4px 18px rgba(255,200,60,.35); }
  .finalRank{ font-size:20px; font-weight:800; margin-bottom:6px; }
  .lb{ text-align:left; margin:16px auto 4px; max-width:340px; }
  .lbRow{ display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:12px; margin:6px 0;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); }
  .lbRow.you{ background:linear-gradient(90deg, rgba(255,210,74,.22), rgba(255,210,74,.06));
    border-color:rgba(255,210,74,.5); box-shadow:0 0 0 1px rgba(255,210,74,.25) inset; }
  .lbPos{ width:22px; font-weight:900; opacity:.8; text-align:center; }
  .lbName{ flex:1; font-weight:700; }
  .lbScore{ font-weight:800; font-variant-numeric:tabular-nums; }
  .best{ margin-top:6px; font-size:13px; opacity:.7; }
  .footnote{ margin-top:14px; font-size:11px; opacity:.45; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- In-game HUD -->
<div id="hud" class="hidden">
  <div class="hudTop">
    <div class="panel">
      <div class="label">Score</div>
      <div class="score" id="scoreVal">0</div>
    </div>
    <div class="panel leader">
      <div class="crown" id="crownEl">👑</div>
      <div class="leaderName" id="playerNameEl">TREVOR</div>
      <div class="rankRow"><span class="gem" id="gem">🥉</span><span class="rankName" id="rankName">Bronze</span></div>
    </div>
    <div class="panel frameInfo">
      <div class="label">Frame</div>
      <div class="frameNum"><span id="frameVal">1</span>/10</div>
      <div class="label" id="ballLabel" style="margin-top:4px;">Ball 1</div>
    </div>
  </div>
</div>
<div id="mute" class="hidden">🔊</div>

<!-- Start screen -->
<div id="startScreen" class="overlay">
  <div class="card">
    <div class="crown" style="font-size:46px;">👑</div>
    <h1 class="title">TREVOR'S<br>BOWLING</h1>
    <p class="subtitle">Type your name to play 🎳</p>
    <input id="nameInput" type="text" placeholder="Your name" maxlength="14" autocomplete="off" autocapitalize="words" spellcheck="false" />
    <button class="bigbtn" id="startBtn">▶ PLAY</button>
    <div class="howto">
      <b>Tap</b> or <b>swipe up</b> to throw — aim left/right to curve.<br>
      Play as <b>Trevor</b> for magic strike powers 👑<br>
      Everyone else plays real bowling (max 300)!
    </div>
  </div>
</div>

<!-- Results screen -->
<div id="resultScreen" class="overlay hidden">
  <div class="card">
    <div class="crown" style="font-size:40px;" id="resultCrown">🏆</div>
    <div class="label" style="opacity:.8;" id="finalLabel">Final Score</div>
    <div class="finalScore" id="finalScore">0</div>
    <div class="finalRank" id="finalRank">💎 Diamond</div>
    <div class="lbTitle" id="lbTitle">🏆 Leaderboard</div>
    <div class="lb" id="leaderboard"></div>
    <div class="best" id="bestLine"></div>
    <button class="bigbtn" id="againBtn" style="margin-top:16px;">↻ PLAY AGAIN</button>
    <div class="footnote">Made for Trevor 💛</div>
  </div>
</div>

<script>
(function(){
"use strict";

// ============================================================
//  Trevor's Bowling — single-file canvas game (no libraries)
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- DOM refs ----
const hud         = document.getElementById('hud');
const muteBtn     = document.getElementById('mute');
const scoreVal    = document.getElementById('scoreVal');
const frameVal    = document.getElementById('frameVal');
const ballLabel   = document.getElementById('ballLabel');
const gemEl       = document.getElementById('gem');
const rankNameEl  = document.getElementById('rankName');
const startScreen = document.getElementById('startScreen');
const resultScreen= document.getElementById('resultScreen');
const finalScore  = document.getElementById('finalScore');
const finalRank   = document.getElementById('finalRank');
const leaderboard = document.getElementById('leaderboard');
const bestLine    = document.getElementById('bestLine');
const nameInput   = document.getElementById('nameInput');
const crownEl     = document.getElementById('crownEl');
const playerNameEl= document.getElementById('playerNameEl');
const finalLabel  = document.getElementById('finalLabel');
const resultCrown = document.getElementById('resultCrown');
const lbTitle     = document.getElementById('lbTitle');

// ---- screen sizing (responsive + retina) ----
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeLane();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

// ---- lane geometry (recomputed on resize) ----
// Lane space: x in [-1,1] (0 = center), y in [0,1] (1 = near/player, 0 = far/pins)
let topY, botY, cx, nearHalf, farHalf;
const nearScale = 1.15, farScale = 0.5;
function computeLane(){
  topY = H * 0.13;
  botY = H * 0.85;
  cx   = W * 0.5;
  nearHalf = Math.min(W * 0.46, W*0.5 - 8);
  farHalf  = nearHalf * 0.36;
}
const lerp = (a,b,t)=> a + (b-a)*t;
// project lane coords -> screen
function project(lx, ly){
  const t = ly;                       // 1 near, 0 far
  const half = lerp(farHalf, nearHalf, t);
  return {
    x: cx + lx * half,
    y: lerp(topY, botY, t),
    half,
    scale: lerp(farScale, nearScale, t)
  };
}

// ============================================================
//  Game constants
// ============================================================
const PIN_R  = 0.05;     // lane-space radius
const BALL_R = 0.055;
const HIT_DIST = PIN_R + BALL_R + 0.005;
const BALL_START_Y = 0.965;

// Physics is retuned per player in startGame():
//   Trevor        -> heavy aim-assist + wide chain, so (almost) everything strikes
//   everyone else -> real aim, real misses, real spares & opens
let CHAIN_DIST = 0.14;   // how far a falling pin knocks its neighbours
let ASSIST     = 1.1;    // how strongly the ball curves toward the pocket

// Trevor's arcade scoring (everyone else uses real ten-pin scoring instead)
const PIN_POINTS   = 500;
const SPARE_BONUS  = 800;
const strikeBonus  = (combo)=> 1000 * combo;     // grows with the combo

// Rank tiers depend on which scoring system is in play
const RANKS_TREVOR = [
  { name:'Bronze',  gem:'🥉', min:0,     color:'#cd7f32' },
  { name:'Silver',  gem:'🥈', min:8000,  color:'#d6d9de' },
  { name:'Gold',    gem:'🥇', min:20000, color:'#ffd24a' },
  { name:'Diamond', gem:'💎', min:40000, color:'#7fe3ff' },
];
const RANKS_STD = [   // real ten-pin scores top out at 300
  { name:'Bronze',  gem:'🥉', min:0,   color:'#cd7f32' },
  { name:'Silver',  gem:'🥈', min:100, color:'#d6d9de' },
  { name:'Gold',    gem:'🥇', min:150, color:'#ffd24a' },
  { name:'Diamond', gem:'💎', min:200, color:'#7fe3ff' },
];

// ============================================================
//  Game state
// ============================================================
let phase = 'start';   // 'start' | 'aim' | 'roll' | 'resolve' | 'wait' | 'results'
let playerName = 'Player';
let isTrevor = false;
let frame = 1, ballNum = 1;
let rolls = [];            // pins knocked per ball — drives standard bowling scoring
let tenthStart = 0;        // index into rolls where the 10th frame begins
let arcadeScore = 0;       // Trevor's inflated running score
let totalScore = 0, displayScore = 0, combo = 0;
let pins = [];
let pinsDownStartOfBall = 0;
let resolveTimer = 0;

const ball = { x:0, y:BALL_START_Y, vx:0, vy:0, active:false, spin:0 };

// floating effects
let confetti = [];
let popups = [];     // {text, x, y, t, life, color, size}

// ============================================================
//  Pins
// ============================================================
function setupPins(){
  const s = 0.135, ys = 0.052, frontY = 0.225;
  const layout = [
    [0, frontY],
    [-s*0.5, frontY-ys], [s*0.5, frontY-ys],
    [-s, frontY-2*ys], [0, frontY-2*ys], [s, frontY-2*ys],
    [-1.5*s, frontY-3*ys], [-0.5*s, frontY-3*ys], [0.5*s, frontY-3*ys], [1.5*s, frontY-3*ys],
  ];
  pins = layout.map(([x,y])=>({
    x, y, hx:x, hy:y,        // home pos
    state:'up',              // 'up' | 'falling' | 'down'
    fall:0, fallDir:0, tilt:(Math.random()*0.4-0.2)
  }));
}

function standingCount(){ return pins.filter(p=>p.state==='up').length; }
function downCount(){ return pins.filter(p=>p.state!=='up').length; }

function knockPin(p, fromx, fromy){
  if(p.state!=='up') return;
  p.state='falling'; p.fall=0;
  const dx = p.x - fromx, dy = p.y - fromy;
  p.fallDir = Math.atan2(dx, -dy);   // tilt direction (screen-ish)
  p.kx = dx; p.ky = dy;
}

// a falling pin clears nearby standing pins (chain reaction → strikes)
function propagatePins(){
  let changed = true;
  while(changed){
    changed = false;
    for(const f of pins){
      if(f.state!=='falling') continue;
      for(const p of pins){
        if(p.state!=='up') continue;
        const d = Math.hypot(p.x-f.x, p.y-f.y);
        if(d < CHAIN_DIST){ knockPin(p, f.x, f.y); changed = true; }
      }
    }
  }
}

// ============================================================
//  Throwing
// ============================================================
function resetBall(){
  ball.x = 0; ball.y = BALL_START_Y; ball.vx = 0; ball.vy = 0;
  ball.active = false; ball.spin = 0;
}

function beginThrow(swipeDX, swipeDY){
  // swipeDY negative = upward. Magnitude = power.
  const mag = Math.hypot(swipeDX, swipeDY);
  let power, aim;
  if(mag < 14){            // a tap → reliable straight strike
    power = 0.62; aim = 0;
  } else {
    power = Math.min(1, Math.max(0.4, (-swipeDY) / (H*0.42)));
    if(swipeDY > -4) power = 0.55;             // wasn't really an up-swipe
    aim = Math.max(-0.7, Math.min(0.7, swipeDX / (W*0.42)));
  }
  const speed = lerp(1.7, 3.0, power);
  ball.vy = -speed;
  ball.vx = aim * speed * 0.55;
  ball.spin = aim;
  ball.active = true;
  phase = 'roll';
  sound.roll();
}

// ============================================================
//  Update loop
// ============================================================
function update(dt){
  // animate pins falling
  for(const p of pins){
    if(p.state==='falling'){
      p.fall += dt / 0.4;
      if(p.fall >= 1){ p.fall = 1; p.state='down'; }
    }
  }
  updateConfetti(dt);
  updatePopups(dt);

  if(phase==='roll'){
    const steps = 4, h = dt/steps;
    for(let i=0;i<steps && ball.active;i++){
      // gentle aim-assist toward the pocket
      ball.vx += (0 - ball.x) * ASSIST * h;
      ball.x += ball.vx * h;
      ball.y += ball.vy * h;
      // ball/pin collisions
      for(const p of pins){
        if(p.state!=='up') continue;
        if(Math.hypot(p.x-ball.x, p.y-ball.y) < HIT_DIST){
          knockPin(p, ball.x, ball.y);
          ball.vy *= 0.94;                       // plow through
          ball.vx += (p.x-ball.x>0?-1:1)*0.05;
          sound.hit();
        }
      }
      propagatePins();
      // ball left the lane area?
      if(ball.y < -0.08 || Math.abs(ball.x) > 1.25){
        ball.active = false;
        phase = 'resolve'; resolveTimer = 0;
      }
    }
  }
  else if(phase==='resolve'){
    propagatePins();
    resolveTimer += dt;
    const stillFalling = pins.some(p=>p.state==='falling');
    if(!stillFalling && resolveTimer > 0.45){
      tallyBall();
    }
  }
}

// ============================================================
//  Scoring + frame flow
// ============================================================

// Real ten-pin bowling score from the list of balls thrown so far.
function standardScore(r){
  let score = 0, i = 0;
  for(let f=0; f<10; f++){
    if(r[i] === undefined) break;
    if(r[i] === 10){                            // strike: 10 + next two balls
      score += 10 + (r[i+1]||0) + (r[i+2]||0);
      i += 1;
    } else if((r[i]||0) + (r[i+1]||0) === 10){  // spare: 10 + next ball
      score += 10 + (r[i+2]||0);
      i += 2;
    } else {                                    // open frame
      score += (r[i]||0) + (r[i+1]||0);
      i += 2;
    }
  }
  return score;
}

function recomputeScore(){
  totalScore = isTrevor ? arcadeScore : standardScore(rolls);
}

function tallyBall(){
  phase = 'wait';                 // leave 'resolve' at once so a ball is tallied exactly once
  const startDown = pinsDownStartOfBall;
  const down = downCount();
  const knocked = down - startDown;
  rolls.push(knocked);

  const freshRack = (startDown === 0);
  const isStrike  = freshRack && down === 10;   // cleared a full rack in one ball
  const isSpare   = !isStrike && down === 10;   // cleared the rack across two balls

  // Trevor's arcade points (everyone else is scored by standardScore instead)
  let gained = knocked * PIN_POINTS, msg = null, msgColor = '#fff';
  if(isStrike){
    combo += 1; gained += strikeBonus(combo) + 5000;
    msg = combo > 1 ? ('STRIKE! x'+combo) : 'STRIKE!'; msgColor = '#ffd24a';
    burstConfetti(34); sound.strike();
  } else if(isSpare){
    gained += SPARE_BONUS; combo = 1;
    msg = 'SPARE!'; msgColor = '#7fe3ff';
    burstConfetti(20); sound.strike();
  } else {
    combo = 0;
  }
  arcadeScore += gained;
  recomputeScore();

  if(isTrevor && gained > 0) addPopup('+'+gained.toLocaleString(), msgColor);
  if(msg) addPopup(msg, msgColor, true);
  updateRank();

  // ---- what happens next ----
  if(frame < 10){
    if(isStrike) scheduleNext(950);
    else if(ballNum === 1){
      ballNum = 2; pinsDownStartOfBall = down; resetBall();
      phase = 'aim'; updateHUD();
    } else scheduleNext(650);
  } else {
    advanceTenth();
  }
}

// Frames 1–9: load the next frame after a short celebration.
function scheduleNext(delay){
  setTimeout(()=>{
    frame += 1; ballNum = 1;
    setupPins(); pinsDownStartOfBall = 0; resetBall();
    if(frame === 10) tenthStart = rolls.length;
    phase = 'aim'; updateHUD();
  }, delay);
}

// 10th frame: up to three balls, fresh pins after each strike and after a spare's bonus ball.
function advanceTenth(){
  const b = rolls.slice(tenthStart);
  const thrown = b.length;
  const cont = (resetRack, delay)=> setTimeout(()=>{
    if(resetRack){ setupPins(); pinsDownStartOfBall = 0; }
    else { pinsDownStartOfBall = downCount(); }
    ballNum = thrown + 1; resetBall(); phase = 'aim'; updateHUD();
  }, delay);
  if(thrown === 1){
    if(b[0] === 10) cont(true, 800);            // strike → fresh rack for ball 2
    else            cont(false, 500);           // aim at the pins still standing
  } else if(thrown === 2){
    if(b[0] === 10)             cont(b[1] === 10, 800); // strike start → 3rd ball (fresh only if ball 2 also a strike)
    else if(b[0] + b[1] === 10) cont(true, 800);        // spare → bonus 3rd ball on a fresh rack
    else                        setTimeout(endGame, 700); // open 10th frame → done
  } else {
    setTimeout(endGame, 700);                             // three balls thrown → done
  }
}

function activeRanks(){ return isTrevor ? RANKS_TREVOR : RANKS_STD; }
function currentRank(){
  const ranks = activeRanks();
  let r = ranks[0];
  for(const t of ranks){ if(totalScore >= t.min) r = t; }
  return r;
}
function updateRank(){
  const r = currentRank();
  gemEl.textContent = r.gem;
  rankNameEl.textContent = r.name;
  rankNameEl.style.color = r.color;
}

function updateHUD(){
  frameVal.textContent = frame;
  ballLabel.textContent = 'Ball ' + ballNum;
  updateRank();
}

// ============================================================
//  Game start / end
// ============================================================
function startGame(){
  // read + tidy the typed name
  const raw = (nameInput.value || '').trim().replace(/\s+/g,' ');
  playerName = raw ? raw.slice(0,14) : 'Player';
  isTrevor = playerName.toLowerCase() === 'trevor';

  // retune physics for this player
  if(isTrevor){ ASSIST = 1.1;  CHAIN_DIST = 0.14; }   // magic: (almost) always strikes
  else        { ASSIST = 0.30; CHAIN_DIST = 0.12; }   // real aim, real misses

  frame=1; ballNum=1; combo=0;
  rolls=[]; tenthStart=0; arcadeScore=0;
  totalScore=0; displayScore=0; scoreVal.textContent='0';
  confetti=[]; popups=[];
  setupPins(); pinsDownStartOfBall=0; resetBall();
  phase='aim';

  // HUD identity
  crownEl.textContent = isTrevor ? '👑' : '🎳';
  playerNameEl.textContent = playerName.toUpperCase();
  playerNameEl.style.color = isTrevor ? 'var(--gold)' : '#cfe3ff';

  startScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  muteBtn.classList.remove('hidden');
  updateHUD();
}

function endGame(){
  phase='results';
  hud.classList.add('hidden');
  recomputeScore();
  const r = currentRank();

  finalLabel.textContent  = playerName + "'s Final Score";
  finalScore.textContent  = totalScore.toLocaleString();
  finalRank.textContent   = r.gem + ' ' + r.name;
  finalRank.style.color   = r.color;
  resultCrown.textContent = isTrevor ? '👑' : '🏆';

  // record this game, then show the board (device-local for now — online next)
  const board = submitScore({ name: playerName, score: totalScore, trevor: isTrevor });
  leaderboard.innerHTML = board.slice(0,8).map((row,i)=>{
    const you = row._k === lastEntryKey;
    return `<div class="lbRow${you?' you':''}">
       <div class="lbPos">${i===0?'👑':'#'+(i+1)}</div>
       <div class="lbName">${escapeHtml(row.name)}${row.trevor?' 👑':''}</div>
       <div class="lbScore">${Number(row.score).toLocaleString()}</div>
     </div>`;
  }).join('');

  let best = 0;
  try{ best = parseInt(localStorage.getItem('tb_best')||'0',10)||0; }catch(e){}
  if(totalScore > best){ best = totalScore; try{ localStorage.setItem('tb_best', String(best)); }catch(e){} }
  bestLine.textContent = '⭐ Best on this device: ' + best.toLocaleString();

  resultScreen.classList.remove('hidden');
  burstConfetti(90);
  sound.strike();
}

// ---- Leaderboard storage -------------------------------------------------
// Device-local for now. To go truly online, swap getLeaderboard()/submitScore()
// for calls to a backend (e.g. Supabase REST) — the rest of the game is unchanged.
let lastEntryKey = '';
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getLeaderboard(){
  try{ return JSON.parse(localStorage.getItem('tb_leaderboard') || '[]'); }catch(e){ return []; }
}
function submitScore(entry){
  const list = getLeaderboard();
  lastEntryKey = 'k_' + Math.floor(performance.now()) + '_' + Math.floor(Math.random()*1e6);
  list.push({ name: entry.name, score: entry.score, trevor: !!entry.trevor, _k: lastEntryKey });
  list.sort((a,b)=> b.score - a.score);
  const top = list.slice(0,50);
  try{ localStorage.setItem('tb_leaderboard', JSON.stringify(top)); }catch(e){}
  return top;
}

// ============================================================
//  Effects
// ============================================================
function burstConfetti(n){
  const colors = ['#ffd24a','#7fe3ff','#ff6b6b','#7CFC8A','#c08bff','#fff'];
  for(let i=0;i<n;i++){
    confetti.push({
      x: cx + (Math.random()-0.5)*W*0.5, y: topY + Math.random()*H*0.2,
      vx:(Math.random()-0.5)*420, vy:(Math.random()*-60)-40,
      g: 700+Math.random()*300, life:0, max:1.4+Math.random()*0.8,
      size:6+Math.random()*7, color:colors[(Math.random()*colors.length)|0],
      rot:Math.random()*6.28, vr:(Math.random()-0.5)*12
    });
  }
}
function updateConfetti(dt){
  for(const c of confetti){ c.life+=dt; c.vy+=c.g*dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.rot+=c.vr*dt; }
  confetti = confetti.filter(c=>c.life<c.max && c.y < H+40);
}
function addPopup(text, color, big){
  popups.push({ text, color:color||'#fff', x:cx, y:H*0.42, t:0, life:1.1, size: big?1:0.7 });
}
function updatePopups(dt){
  for(const p of popups){ p.t+=dt; p.y -= 40*dt; }
  popups = popups.filter(p=>p.t<p.life);
}

// ============================================================
//  Rendering
// ============================================================
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawLane();
  drawPinsAndBall();
  drawAimGuide();
  drawConfetti();
  drawPopups();
}

function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1422'); g.addColorStop(0.5,'#0b0f1a'); g.addColorStop(1,'#05070c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // back wall glow behind the pins
  const gg = ctx.createRadialGradient(cx, topY, 10, cx, topY, W*0.6);
  gg.addColorStop(0,'rgba(60,90,140,.28)'); gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg; ctx.fillRect(0,0,W,H*0.5);
}

function laneEdges(){
  const tl=project(-1,0), tr=project(1,0), bl=project(-1,1), br=project(1,1);
  return {tl,tr,bl,br};
}

function drawLane(){
  const e = laneEdges();
  // gutters (slightly outside the lane)
  const gl=project(-1.18,0), gr=project(1.18,0), gbl=project(-1.18,1), gbr=project(1.18,1);
  ctx.fillStyle='#11161f';
  poly([gl,e.tl,e.bl,gbl]); poly([e.tr,gr,gbr,e.br]);
  // gutter shine
  ctx.fillStyle='rgba(120,150,190,.10)';
  poly([gl,project(-1.10,0),project(-1.10,1),gbl]);
  poly([project(1.10,0),gr,gbr,project(1.10,1)]);

  // lane wood
  const wood = ctx.createLinearGradient(0,topY,0,botY);
  wood.addColorStop(0,'#caa063'); wood.addColorStop(0.5,'#d8a85f'); wood.addColorStop(1,'#e8b96a');
  ctx.fillStyle = wood;
  poly([e.tl,e.tr,e.br,e.bl]);

  // planks
  ctx.lineWidth=1; ctx.strokeStyle='rgba(120,80,30,.28)';
  for(let i=1;i<14;i++){
    const lx=-1 + (i/14)*2;
    const a=project(lx,0), b=project(lx,1);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  // gloss highlight down the middle
  const gloss=ctx.createLinearGradient(0,topY,0,botY);
  gloss.addColorStop(0,'rgba(255,255,255,0)'); gloss.addColorStop(0.7,'rgba(255,255,255,.10)'); gloss.addColorStop(1,'rgba(255,255,255,.20)');
  ctx.fillStyle=gloss;
  poly([project(-0.5,0),project(0.5,0),project(0.5,1),project(-0.5,1)]);

  // aiming arrows (classic lane dots/arrows)
  ctx.fillStyle='rgba(110,70,25,.6)';
  for(const ax of [-0.45,-0.22,0,0.22,0.45]){
    const p=project(ax,0.62), sc=p.scale;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y-9*sc); ctx.lineTo(p.x-6*sc, p.y+5*sc); ctx.lineTo(p.x+6*sc, p.y+5*sc);
    ctx.closePath(); ctx.fill();
  }
  // foul line
  const fl=project(-1,0.93), fr=project(1,0.93);
  ctx.strokeStyle='rgba(150,90,30,.7)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(fl.x,fl.y); ctx.lineTo(fr.x,fr.y); ctx.stroke();

  // pin deck (dark area where the pins stand)
  ctx.fillStyle='rgba(20,24,32,.55)';
  poly([project(-1,0),project(1,0),project(0.9,0.03),project(-0.9,0.03)]);
}
function poly(pts){
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath(); ctx.fill();
}

function drawPinsAndBall(){
  // draw far things first → near things last (painter's algorithm)
  const items = pins.map(p=>({type:'pin', obj:p, depth:p.y}));
  if(ball.active || phase==='aim') items.push({type:'ball', depth:ball.y});
  items.sort((a,b)=> a.depth - b.depth); // smaller y (far) first
  for(const it of items){
    if(it.type==='pin') drawPin(it.obj); else drawBall();
  }
}

function drawPin(p){
  const pr = project(p.x, p.y);
  const sc = pr.scale;
  const w = 15*sc, h = 40*sc;
  ctx.save();
  ctx.translate(pr.x, pr.y);

  if(p.state==='down' || (p.state==='falling' && p.fall>0.96)){
    // lying down — a little flattened ellipse on the deck
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(0,0, w*1.1, w*0.5, 0, 0, 6.283); ctx.fill();
    ctx.fillStyle='#eef0f4';
    ctx.beginPath(); ctx.ellipse(0,-2*sc, w*0.95, w*0.42, 0, 0, 6.283); ctx.fill();
    ctx.restore(); return;
  }

  // shadow
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(0,0, w*0.95, w*0.4, 0,0,6.283); ctx.fill();

  // tilt while falling
  if(p.state==='falling'){
    const ang = p.fall * (Math.PI*0.46);
    ctx.rotate((p.kx>0?1:-1) * ang);
    ctx.translate(0, -p.fall*4*sc);
  } else {
    ctx.rotate(p.tilt*0.02);
  }

  // pin body (bottle silhouette), base at y=0 going up
  const grd = ctx.createLinearGradient(-w,0,w,0);
  grd.addColorStop(0,'#cfd3da'); grd.addColorStop(0.35,'#ffffff'); grd.addColorStop(1,'#dfe3ea');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.moveTo(-w*0.55, 0);
  ctx.quadraticCurveTo(-w*0.95,-h*0.18, -w*0.55,-h*0.42);
  ctx.quadraticCurveTo(-w*0.28,-h*0.6, -w*0.3,-h*0.74);
  ctx.quadraticCurveTo(-w*0.34,-h*0.92, 0,-h);             // head left
  ctx.quadraticCurveTo(w*0.34,-h*0.92, w*0.3,-h*0.74);     // head right
  ctx.quadraticCurveTo(w*0.28,-h*0.6, w*0.55,-h*0.42);
  ctx.quadraticCurveTo(w*0.95,-h*0.18, w*0.55,0);
  ctx.closePath(); ctx.fill();

  // red stripes
  ctx.fillStyle='#e23b3b';
  ctx.fillRect(-w*0.5, -h*0.66, w, h*0.07);
  ctx.fillRect(-w*0.46,-h*0.55, w*0.92, h*0.06);
  ctx.restore();
}

function drawBall(){
  const pr = project(ball.x, Math.max(ball.y,-0.05));
  const sc = pr.scale;
  const r = 20*sc;
  // contact shadow
  ctx.fillStyle='rgba(0,0,0,.32)';
  ctx.beginPath(); ctx.ellipse(pr.x, pr.y+r*0.55, r*0.95, r*0.4, 0,0,6.283); ctx.fill();
  // sphere
  const g = ctx.createRadialGradient(pr.x-r*0.35, pr.y-r*0.4, r*0.1, pr.x, pr.y, r);
  g.addColorStop(0,'#7fd0ff'); g.addColorStop(0.45,'#2f7fe0'); g.addColorStop(1,'#15356e');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(pr.x, pr.y, r, 0, 6.283); ctx.fill();
  // highlight
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(pr.x-r*0.32, pr.y-r*0.38, r*0.28, r*0.18, -0.5,0,6.283); ctx.fill();
  // finger holes
  ctx.fillStyle='rgba(10,20,40,.85)';
  for(const o of [[-0.16,-0.05],[0.04,-0.16],[0.16,0.02]]){
    ctx.beginPath(); ctx.arc(pr.x+o[0]*r*1.6, pr.y+o[1]*r*1.6, r*0.12, 0,6.283); ctx.fill();
  }
}

// dotted aim guide + power indicator while preparing a throw
let drag = null;   // {sx,sy,cx,cy}
function drawAimGuide(){
  if(phase!=='aim') return;
  const start = project(ball.x, ball.y);
  // resting hint line straight up
  if(!drag){
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=2; ctx.setLineDash([6,8]);
    const top=project(ball.x, 0.25);
    ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(top.x,top.y); ctx.stroke();
    ctx.setLineDash([]);
    // "swipe to throw" prompt
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='600 '+Math.round(Math.min(W,H)*0.035)+'px Trebuchet MS, sans-serif';
    ctx.textAlign='center';
    ctx.fillText('⬆ swipe to throw', start.x, start.y + 42);
    return;
  }
  // active drag → show predicted direction + power
  const dx = drag.cx-drag.sx, dy = drag.cy-drag.sy;
  const aim = Math.max(-0.7, Math.min(0.7, dx/(W*0.42)));
  const power = Math.min(1, Math.max(0.4, (-dy)/(H*0.42)));
  ctx.strokeStyle='rgba(255,210,74,.9)'; ctx.lineWidth=4; ctx.setLineDash([10,8]);
  ctx.beginPath(); ctx.moveTo(start.x,start.y);
  const aimTop = project(aim*0.9, 0.18);
  ctx.lineTo(aimTop.x, aimTop.y); ctx.stroke(); ctx.setLineDash([]);
  // arrow head
  ctx.fillStyle='rgba(255,210,74,.95)';
  ctx.beginPath(); ctx.arc(aimTop.x, aimTop.y, 7, 0, 6.283); ctx.fill();
  // power bar
  const pw = 120, ph = 10, px = start.x - pw/2, py = start.y + 26;
  ctx.fillStyle='rgba(255,255,255,.18)'; roundRect(px,py,pw,ph,5); ctx.fill();
  ctx.fillStyle = power>0.8?'#ff6b6b':'#ffd24a'; roundRect(px,py,pw*power,ph,5); ctx.fill();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawConfetti(){
  for(const c of confetti){
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.globalAlpha = Math.max(0, 1-(c.life/c.max));
    ctx.fillStyle=c.color; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*0.6);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}
function drawPopups(){
  ctx.textAlign='center';
  for(const p of popups){
    const a = Math.max(0, 1-(p.t/p.life));
    ctx.globalAlpha=a;
    const size = Math.min(W,H)*0.07*p.size;
    ctx.font='900 '+Math.round(size)+'px Trebuchet MS, sans-serif';
    ctx.lineWidth=Math.max(3,size*0.12); ctx.strokeStyle='rgba(0,0,0,.55)';
    ctx.strokeText(p.text, p.x, p.y); ctx.fillStyle=p.color; ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha=1;
}

// ============================================================
//  Main loop
// ============================================================
let last = 0;
function loop(ts){
  if(!last) last = ts;
  let dt = (ts-last)/1000; last = ts;
  if(dt>0.05) dt=0.05;   // clamp big gaps

  if(phase!=='start' && phase!=='results') update(dt);

  // smooth score counter
  if(displayScore !== totalScore){
    const diff = totalScore - displayScore;
    displayScore += Math.sign(diff) * Math.max(1, Math.ceil(Math.abs(diff)*0.18));
    if((diff>0 && displayScore>totalScore)||(diff<0 && displayScore<totalScore)) displayScore=totalScore;
    scoreVal.textContent = displayScore.toLocaleString();
  }

  draw();
  requestAnimationFrame(loop);
}

// ============================================================
//  Input — pointer (works for touch + mouse)
// ============================================================
function getXY(ev){
  if(ev.touches && ev.touches[0]) return {x:ev.touches[0].clientX, y:ev.touches[0].clientY};
  if(ev.changedTouches && ev.changedTouches[0]) return {x:ev.changedTouches[0].clientX, y:ev.changedTouches[0].clientY};
  return {x:ev.clientX, y:ev.clientY};
}
function onDown(ev){
  if(phase!=='aim') return;
  const p=getXY(ev); drag={sx:p.x, sy:p.y, cx:p.x, cy:p.y};
  ev.preventDefault();
}
function onMove(ev){
  if(!drag) return;
  const p=getXY(ev); drag.cx=p.x; drag.cy=p.y;
  // live-aim the resting ball a touch so it feels responsive
  const aim = Math.max(-0.7, Math.min(0.7, (drag.cx-drag.sx)/(W*0.42)));
  ball.x = aim*0.25;
  ev.preventDefault();
}
function onUp(ev){
  if(!drag) return;
  const p=getXY(ev);
  const dx=p.x-drag.sx, dy=p.y-drag.sy;
  drag=null;
  if(phase==='aim') beginThrow(dx,dy);
  ev.preventDefault();
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
window.addEventListener('contextmenu', e=>e.preventDefault());

document.getElementById('startBtn').addEventListener('click', ()=>{ sound.init(); startGame(); });
nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ sound.init(); startGame(); } });
document.getElementById('againBtn').addEventListener('click', ()=>{
  resultScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
  nameInput.value = (playerName === 'Player') ? '' : playerName;
  phase = 'start';
});

// ============================================================
//  Sound — tiny WebAudio synth (best-effort, mutable)
// ============================================================
const sound = (function(){
  let actx=null, muted=false;
  function init(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
  function tone(freq, dur, type, vol){
    if(!actx||muted) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(vol||0.18, actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+dur+0.02);
  }
  function noise(dur, vol){
    if(!actx||muted) return;
    const n=Math.floor(actx.sampleRate*dur), buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=actx.createBufferSource(); s.buffer=buf;
    const g=actx.createGain(); g.gain.value=vol||0.25;
    s.connect(g); g.connect(actx.destination); s.start();
  }
  return {
    init, mute(m){ muted=m; },
    roll(){ init(); tone(90,0.5,'sawtooth',0.06); },
    hit(){ noise(0.08,0.18); },
    strike(){ init(); [523,659,784,1047].forEach((f,i)=> setTimeout(()=>tone(f,0.18,'triangle',0.16), i*70)); noise(0.2,0.3); }
  };
})();
muteBtn.addEventListener('click', ()=>{
  const m = muteBtn.textContent==='🔊';
  sound.mute(m); muteBtn.textContent = m?'🔇':'🔊';
});

// ============================================================
//  Boot
// ============================================================
resize();
setupPins();
requestAnimationFrame(loop);
})();
</script>
